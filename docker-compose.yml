services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/taxi/raw && mc mb --ignore-existing local/taxi/processed"]

  spark-master:
    image: apache/spark:3.5.3
    command: ["/bin/bash", "-c", "/opt/spark/bin/sbin/start-master.sh && tail -f /dev/null"]
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:3.5.3
    depends_on:
      - spark-master
    command: ["/bin/bash", "-c", "/opt/spark/bin/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"]

  api:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - minio
      - spark-master
